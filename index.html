<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pere Ozogu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .hero {
            background-color: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 1.1em;
            color: #999;
            margin-bottom: 30px;
            font-style: italic;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px 5px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background-color: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background-color: #667eea;
            color: white;
        }
        .social-links {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .social-links a {
            display: inline-block;
            width: 40px;
            height: 40px;
            margin: 0 8px;
            padding: 0;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
            color: white;
            font-size: 1.2em;
        }
        .linkedin {
            background-color: #0077B5;
        }
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .github {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Pere Ozogu</h1>
        <p>DevOps Engineer | Full-Stack Engineer | UI/UX Enthusiast</p>
        <p class="tagline">Just a messenger passing through life 👋</p>

        <div class="button-group">
            <a href="resume.html" class="btn-primary">View Resume</a>
            <a href="https://kakarath.blogspot.com" class="btn-secondary" target="_blank">Blog</a>
        </div>

        <div class="social-links">
            <a href="https://linkedin.com/in/pere-ozogu-334153113" class="linkedin" title="LinkedIn" target="_blank">in</a>
            <a href="https://instagram.com/pere.ozogu" class="instagram" title="Instagram" target="_blank">📷</a>
            <a href="https://github.com/kakarath" class="github" title="GitHub" target="_blank">⚙️</a>
        </div>
    </div>
</body>
</html>
